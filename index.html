<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>رئاسة مجلس الوزراء - الجمهورية العربية السورية</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cairo:wght@200..1000&family=Poppins:wght@100;400;500;600&family=Noto+Sans+Arabic:wght@100..900&family=Noto+Kufi+Arabic:wght@100..900&display=swap"
    rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Qomra';
      src: url('/fonts/itfQomraArabic-Light.otf') format('opentype');
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: 'Qomra';
      src: url('/fonts/itfQomraArabic-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'Qomra';
      src: url('/fonts/itfQomraArabic-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Qomra"', '"Cairo"', '"Noto Sans Arabic"', 'Arial', 'sans-serif'],
            display: ['"Qomra"', '"Cairo"', '"Noto Kufi Arabic"', 'Arial', 'sans-serif'],
            poppins: ['"Poppins"', 'sans-serif'],
          },
          colors: {
            gov: {
              forest: '#094239',
              emerald: '#094239',
              emeraldLight: '#115E59',
              teal: '#428177',
              gold: '#b9a779',
              sand: '#988561',
              beige: '#edebe0',
              umber: '#260f14',
              cherry: '#4a151e',
              red: '#6b1f2a',
              charcoal: '#161616',
              stone: '#3d3a3b'
            },
            mofa: {
              teal: '#054239', // Official Match
              light: '#f0fdfa'
            }
          },
          backgroundImage: {
            'pattern-islamic': "url('/assets/header-bg.png')",
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            fadeInUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #edebe0; /* Ivory Mist */
      color: #161616; /* Charcoal */
      transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.dark {
      background-color: #094239; /* Gov Forest */
      color: #edebe0;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(185, 167, 121, 0.2);
    }

    .dark .glass-card {
      background: rgba(9, 66, 57, 0.7);
      border: 1px solid rgba(185, 167, 121, 0.1);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 10px;
    }

    ::-webkit-scrollbar-track {
      background: #edebe0;
    }

    .dark ::-webkit-scrollbar-track {
      background: #094239;
    }

    ::-webkit-scrollbar-thumb {
      background: #094239;
      border-radius: 5px;
      border: 2px solid #edebe0;
    }

    .dark ::-webkit-scrollbar-thumb {
      background: #b9a779;
      border: 2px solid #094239;
    }

    /* Hide scrollbar for ticker */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* --- High Contrast Mode Styles --- */
    html.high-contrast {
      filter: contrast(125%) saturate(110%);
    }

    body.high-contrast {
      background-color: #000000 !important;
      color: #FFFF00 !important;
    }

    /* Force overrides for High Contrast */
    .high-contrast :not(img):not(video) {
        background-color: #000000 !important;
        color: #FFFF00 !important;
        border-color: #FFFFFF !important;
        box-shadow: none !important;
        text-shadow: none !important;
        background-image: none !important;
    }

    .high-contrast img,
    .high-contrast video {
      filter: grayscale(100%) contrast(150%);
      border: 3px solid #FFFFFF !important;
    }

    .high-contrast a,
    .high-contrast button {
      color: #00FFFF !important;
      text-decoration: underline !important;
      font-weight: bold !important;
      border: 2px solid #00FFFF !important;
      padding: 2px 5px;
    }

    .high-contrast input,
    .high-contrast textarea,
    .high-contrast select {
      border: 2px solid #FFFFFF !important;
      color: #FFFFFF !important;
      background-color: #000000 !important;
    }

    .high-contrast ::placeholder {
      color: #FFFF00 !important;
      opacity: 0.7;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "gsap": "https://esm.sh/gsap@3.12.5",
    "gsap/ScrollTrigger": "https://esm.sh/gsap@3.12.5/ScrollTrigger",
    "gsap/": "https://esm.sh/gsap@^3.14.2/"
  }
}
</script>
</head>

<body
  class="bg-gov-beige text-gov-charcoal font-sans antialiased overflow-x-hidden selection:bg-gov-gold selection:text-gov-forest">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
