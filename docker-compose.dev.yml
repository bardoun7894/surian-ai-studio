services:
  # Frontend (Next.js 14) - Development Mode with Hot Reload
  frontend-next:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3101:3000"
    volumes:
      - ./frontend-next:/app
      - /app/node_modules  # Exclude node_modules from mount
      - /app/.next         # Exclude .next from mount
    environment:
      - NODE_ENV=development
      # Server-side URLs (internal Docker network)
      - BACKEND_URL=http://backend-web
      - AI_SERVICE_URL=http://ai-service:8000
      # Client-side URLs (public IP for browser access)
      - NEXT_PUBLIC_API_URL=
      - NEXT_PUBLIC_BACKEND_URL=http://91.230.110.187:8002
      - NEXT_PUBLIC_AI_SERVICE_URL=http://91.230.110.187:8001
      - NEXT_PUBLIC_SESSION_TIMEOUT=15
      - WATCHPACK_POLLING=true  # Enable polling for file changes in Docker
    depends_on:
      - backend-web
      - ai-service

  # Backend Web Server (Nginx)
  backend-web:
    image: nginx:alpine
    ports:
      - "8002:80"
    volumes:
      - ./backend:/var/www
      - ./backend/docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

  # Backend App (PHP-FPM) - Hot reload enabled via volume mount
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - /var/www/vendor  # Exclude vendor from mount to use container's vendor
      - ./backend/docker/php-uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=surian_db
      - DB_USERNAME=surian_user
      - DB_PASSWORD=surian_pass
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      - SANCTUM_STATEFUL_DOMAINS=localhost:3002,localhost:8080,localhost:8002,frontend-next:3000,91.230.110.187:8002,91.230.110.187:3002
      - SESSION_DOMAIN=null
      - CACHE_DRIVER=array
      - CONFIG_CACHE=false
    depends_on:
      - db
      - redis

  # Database (PostgreSQL)
  db:
    image: pgvector/pgvector:0.8.0-pg15
    environment:
      - POSTGRES_DB=surian_db
      - POSTGRES_USER=surian_user
      - POSTGRES_PASSWORD=surian_pass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Cache (Redis)
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  # AI Service (FastAPI) - Hot reload enabled via volume mount
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./ai-service:/app
    env_file:
      - ./ai-service/.env
    environment:
      - CORS_ORIGINS=["http://localhost:8080","http://localhost:3002","http://frontend-next:3000","http://91.230.110.187:3002","http://91.230.110.187:8002"]
    ports:
      - "8001:8000"

volumes:
  db_data:
  redis_data:
